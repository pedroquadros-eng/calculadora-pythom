<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Python</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calculadora-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);
            width: 320px;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            background-color: #007bff;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .resultado-painel {
            margin-top: 25px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
        }
        #resultado-valor {
            color: #007bff;
        }
    </style>
</head>
<body>

    <div class="calculadora-container">
        <h2>Calculadora Python</h2>
        
        <input type="number" id="num1" placeholder="Digite o 1º número">
        
        <select id="operacao">
            <option value="+">Somar (+)</option>
            <option value="-">Subtrair (-)</option>
            <option value="*">Multiplicar (*)</option>
            <option value="/">Dividir (/)</option>
        </select>
        
        <input type="number" id="num2" placeholder="Digite o 2º número">
        
        <button type="button" onclick="fazerCalculo()">Calcular</button>
        
        <div class="resultado-painel">
            Resultado: <span id="resultado-valor">---</span>
        </div>
    </div>

    <script>
        async function fazerCalculo() {
            // 1. Captura os valores que estão na tela
            const num1 = document.getElementById('num1').value;
            const num2 = document.getElementById('num2').value;
            const operacao = document.getElementById('operacao').value;
            const campoResultado = document.getElementById('resultado-valor');

            // 2. Validação simples antes de mandar para o Python
            if (num1 === "" || num2 === "") {
                campoResultado.innerText = "Preencha os dois campos!";
                campoResultado.style.color = "red";
                return;
            }

            try {
                // 3. Envia os dados via API para o nosso Back-end Flask
                const resposta = await fetch('http://127.0.0.1:5000/calcular', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        num1: num1,
                        num2: num2,
                        operacao: operacao
                    })
                });

                const dados = await resposta.json();

                // 4. Trata o retorno do servidor
                if (resposta.ok) {
                    // Se a conta deu certo, exibe o valor em verde
                    campoResultado.innerText = dados.resultado;
                    campoResultado.style.color = "green";
                } else {
                    // Se o Python barrou algo (ex: divisão por zero), mostra o erro em vermelho
                    campoResultado.innerText = dados.erro;
                    campoResultado.style.color = "red";
                }

            } catch (erro) {
                console.error("Erro na requisição:", erro);
                campoResultado.innerText = "Erro ao conectar com o servidor!";
                campoResultado.style.color = "red";
            }
        }
    </script>
</body>
</html>
