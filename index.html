<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Python</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #282c34; margin: 0; }
        .calculadora { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; width: 300px; }
        h2 { margin-top: 0; color: #333; }
        input, select, button { margin: 10px 0; padding: 12px; width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        #resultado { margin-top: 20px; font-size: 1.5em; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div class="calculadora">
        <h2>Calculadora Python</h2>
        
        <input type="number" id="num1" placeholder="Digite o 1º número">
        <select id="operacao">
            <option value="+">Somar (+)</option>
            <option value="-">Subtrair (-)</option>
            <option value="*">Multiplicar (*)</option>
            <option value="/">Dividir (/)</option>
        </select>
        <input type="number" id="num2" placeholder="Digite o 2º número">
        
        <button onclick="fazerCalculo()">Calcular</button>
        
        <div id="resultado">Resultado: ---</div>
    </div>

    <script>
        async function fazerCalculo() {
            const num1 = document.getElementById('num1').value;
            const num2 = document.getElementById('num2').value;
            const operacao = document.getElementById('operacao').value;

            // Bloqueia o clique se os campos estiverem vazios
            if(!num1 || !num2) {
                document.getElementById('resultado').innerText = 'Erro: Preencha tudo!';
                document.getElementById('resultado').style.color = 'red';
                return;
            }

            try {
                // Tenta enviar para o Python
                const resposta = await fetch('http://127.0.0.1:5000/calcular', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ num1: num1, num2: num2, operacao: operacao })
                });

                const dados = await resposta.json();

                // Mostra a resposta do Python
                if (dados.erro) {
                    document.getElementById('resultado').innerText = 'Erro: ' + dados.erro;
                    document.getElementById('resultado').style.color = 'red';
                } else {
                    document.getElementById('resultado').innerText = 'Resultado: ' + dados.resultado;
                    document.getElementById('resultado').style.color = 'green';
                }
            } catch (erro) {
                // Se o Python estiver desligado, avisa na tela
                document.getElementById('resultado').innerText = 'Erro: Servidor Python desligado!';
                document.getElementById('resultado').style.color = 'red';
            }
        }
    </script>
</body>
</html>
